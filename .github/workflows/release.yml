name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno fmt --check
      - run: deno lint
      - run: deno task check

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Compile binaries
        run: |
          mkdir -p dist
          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin; do
            deno compile \
              --allow-run=git,gh,open,xdg-open,explorer \
              --allow-read --allow-write --allow-env --allow-net \
              --target "$target" \
              --output "dist/git-dash-$target" \
              main.ts
          done
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v0.1.${{ github.run_number }}"
          gh release create "$tag" dist/git-dash-* \
            --title "$tag" --generate-notes --latest
